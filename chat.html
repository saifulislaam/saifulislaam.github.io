<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Saif AI - Model Select</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Fixed Top Bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #000000;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 10;
        }
        
        /* Model Selector */
        .model-selector {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 30px;
            padding: 4px;
            display: flex;
            gap: 4px;
        }
        
        .model-option {
            padding: 8px 16px;
            border-radius: 26px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: #666;
        }
        
        .model-option.active {
            background: #10a37f;
            color: white;
        }
        
        .model-option i {
            margin-right: 6px;
            font-size: 12px;
        }
        
        /* Chat Area */
        .chat-area {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 120px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* Prompt Improvement Area */
        .prompt-area {
            position: fixed;
            bottom: 70px;
            left: 0;
            right: 0;
            height: 50px;
            background: #0a0a0a;
            border-top: 1px solid #2a2a2a;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            z-index: 9;
        }
        
        .improved-prompt {
            flex: 1;
            color: #10a37f;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .enhance-btn {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 6px 12px;
            color: #10a37f;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .enhance-btn:hover {
            background: #10a37f;
            color: white;
        }
        
        /* Bottom Bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: #000000;
            border-top: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            padding: 0 12px;
            z-index: 10;
        }
        
        /* Chat input */
        .chat-input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 24px;
            height: 44px;
            padding: 0 16px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        
        .chat-input:focus {
            border-color: #10a37f;
        }
        
        .chat-input::placeholder {
            color: #666666;
        }
        
        /* Icon buttons */
        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .icon-btn:hover {
            background: #2a2a2a;
        }
        
        .send-btn {
            background: #10a37f;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .send-btn:hover {
            background: #0e906f;
        }
        
        /* Message bubbles */
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }
        
        .user-message {
            background: #2a2a2a;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .ai-message {
            background: #1a1a1a;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Time stamp */
        .time-stamp {
            font-size: 10px;
            color: #666666;
            margin-top: 4px;
        }
        
        /* Generated media */
        .generated-image, .generated-video {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 6px;
            border: 1px solid #2a2a2a;
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            margin-top: 60px;
            color: #666666;
        }
        
        .empty-state i {
            font-size: 40px;
            color: #2a2a2a;
            margin-bottom: 12px;
        }
        
        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #1a1a1a;
            border-radius: 16px 16px 16px 4px;
            width: fit-content;
        }
        
        .typing-dot {
            width: 6px;
            height: 6px;
            background: #666;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); background: #888; }
        }
        
        /* Model badge */
        .model-badge {
            background: #10a37f20;
            border: 1px solid #10a37f40;
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 10px;
            color: #10a37f;
            margin-left: 8px;
        }
        
        /* Sidebar */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            bottom: 0;
            width: 280px;
            background: #0d0d0d;
            border-right: 1px solid #2a2a2a;
            transition: left 0.3s ease;
            z-index: 20;
            overflow-y: auto;
        }
        
        .sidebar.open {
            left: 0;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 15;
            display: none;
        }
        
        .overlay.active {
            display: block;
        }
        
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #2a2a2a;
        }
        
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .logo-icon {
            width: 36px;
            height: 36px;
            background: #10a37f;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }
        
        .history-item {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .history-item:hover {
            background: #1a1a1a;
            color: white;
        }
        
        .history-item.active {
            background: #1a1a1a;
            color: white;
            border-left: 2px solid #10a37f;
        }
        
        .menu-title {
            color: #666;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            padding: 16px 16px 8px;
        }
    </style>
</head>
<body>
    <!-- Hidden API Key -->
    <div id="api-key" style="display: none;">pk_i8GI8nuBSyGTlSrs</div>
    
    <!-- Overlay -->
    <div id="overlay" class="overlay" onclick="closeSidebar()"></div>
    
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <div class="logo-icon">S</div>
                <div>
                    <div class="font-semibold text-white">Saif AI</div>
                    <div class="text-xs text-[#10a37f]">Online • 4.0</div>
                </div>
            </div>
            
            <button onclick="startNewChat()" class="w-full bg-[#1a1a1a] text-white py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-[#2a2a2a] transition text-sm">
                <i class="fas fa-plus text-[#10a37f] text-xs"></i>
                New Chat
            </button>
        </div>
        
        <div class="menu-title">RECENT CHATS</div>
        <div id="historyList" class="space-y-1">
            <!-- History items will be populated here -->
        </div>
    </div>
    
    <!-- Fixed Top Bar with Model Selector -->
    <div class="top-bar">
        <div class="flex items-center gap-3">
            <div class="icon-btn" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </div>
            <div>
                <span class="font-semibold text-white">Saif AI</span>
            </div>
        </div>
        
        <!-- Model Selector -->
        <div class="model-selector">
            <div class="model-option active" onclick="setModel('text', this)">
                <i class="fas fa-comment"></i> Text
            </div>
            <div class="model-option" onclick="setModel('image', this)">
                <i class="fas fa-image"></i> Image
            </div>
            <div class="model-option" onclick="setModel('video', this)">
                <i class="fas fa-video"></i> Video
            </div>
        </div>
        
        <div class="w-8 h-8 rounded-full bg-[#10a37f] flex items-center justify-center text-sm font-medium">
            S
        </div>
    </div>
    
    <!-- Chat Area -->
    <div id="chatArea" class="chat-area">
        <!-- Messages will appear here -->
        <div class="empty-state" id="emptyState">
            <i class="far fa-comment-dots"></i>
            <p class="text-sm text-gray-600">Select a model and start chatting</p>
            <div class="flex gap-2 justify-center mt-3 text-xs">
                <span class="px-2 py-1 bg-[#1a1a1a] rounded-full"><i class="fas fa-comment mr-1 text-[#10a37f]"></i>Text</span>
                <span class="px-2 py-1 bg-[#1a1a1a] rounded-full"><i class="fas fa-image mr-1 text-[#10a37f]"></i>Image</span>
                <span class="px-2 py-1 bg-[#1a1a1a] rounded-full"><i class="fas fa-video mr-1 text-[#10a37f]"></i>Video</span>
            </div>
        </div>
    </div>
    
    <!-- Prompt Improvement Area -->
    <div class="prompt-area">
        <i class="fas fa-magic text-[#10a37f] text-xs"></i>
        <div id="improvedPrompt" class="improved-prompt">Your prompt will be enhanced for better results</div>
        <div class="enhance-btn" onclick="enhancePrompt()">
            <i class="fas fa-sparkle mr-1"></i>Enhance
        </div>
    </div>
    
    <!-- Fixed Bottom Bar -->
    <div class="bottom-bar">
        <div class="flex items-center gap-2 w-full">
            <div class="icon-btn" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-plus"></i>
            </div>
            <input type="file" id="fileInput" style="display: none;">
            
            <input type="text" id="chatInput" class="chat-input" placeholder="Type your message..." autocomplete="off" oninput="updatePromptPreview(this.value)">
            
            <div class="send-btn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </div>
        </div>
    </div>

    <script>
        // API Key
        const API_KEY = document.getElementById('api-key').textContent.trim();
        const BASE_URL = 'https://gen.pollinations.ai';
        
        // State
        let currentModel = 'text'; // text, image, video
        let currentChatId = null;
        let chats = [];
        let sidebarOpen = false;
        let currentPrompt = '';
        
        // DOM Elements
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const chatArea = document.getElementById('chatArea');
        const chatInput = document.getElementById('chatInput');
        const emptyState = document.getElementById('emptyState');
        const historyList = document.getElementById('historyList');
        const improvedPrompt = document.getElementById('improvedPrompt');
        const modelOptions = document.querySelectorAll('.model-option');
        
        // Model-specific prompts
        const modelPrompts = {
            text: {
                placeholder: "Ask me anything...",
                enhance: (p) => p
            },
            image: {
                placeholder: "Describe the image you want to create...",
                enhance: (p) => {
                    const enhancements = [
                        "high quality", "detailed", "4k", "professional",
                        "cinematic lighting", "vibrant colors", "sharp focus"
                    ];
                    return p + ", " + enhancements.slice(0, 3).join(", ");
                }
            },
            video: {
                placeholder: "Describe the video you want to generate...",
                enhance: (p) => {
                    const enhancements = [
                        "cinematic", "smooth motion", "high quality",
                        "professional grade", "fluid animation", "4k resolution"
                    ];
                    return p + ", " + enhancements.slice(0, 3).join(", ");
                }
            }
        };
        
        // Set model
        function setModel(model, element) {
            currentModel = model;
            
            // Update active state
            modelOptions.forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
            
            // Update placeholder
            chatInput.placeholder = modelPrompts[model].placeholder;
            
            // Clear improved prompt
            improvedPrompt.textContent = `Ready to generate ${model}`;
            
            // Add system message
            addSystemMessage(`Switched to ${model} mode`);
        }
        
        // Update prompt preview
        function updatePromptPreview(text) {
            currentPrompt = text;
            if (text.length > 0) {
                improvedPrompt.textContent = `Current: "${text.substring(0, 30)}${text.length > 30 ? '...' : ''}"`;
            } else {
                improvedPrompt.textContent = `Ready to generate ${currentModel}`;
            }
        }
        
        // Enhance prompt
        function enhancePrompt() {
            if (!currentPrompt) {
                improvedPrompt.textContent = "Type something first to enhance!";
                return;
            }
            
            const enhanced = modelPrompts[currentModel].enhance(currentPrompt);
            chatInput.value = enhanced;
            improvedPrompt.textContent = `✨ Enhanced: "${enhanced.substring(0, 40)}${enhanced.length > 40 ? '...' : ''}"`;
        }
        
        // Add system message
        function addSystemMessage(text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai-message';
            messageDiv.style.background = '#10a37f20';
            messageDiv.style.border = '1px solid #10a37f40';
            messageDiv.innerHTML = `
                <div class="text-sm text-[#10a37f] flex items-center gap-2">
                    <i class="fas fa-info-circle"></i>
                    ${text}
                </div>
                <div class="time-stamp">${formatTime(new Date())}</div>
            `;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        // Load chats from localStorage
        function loadChats() {
            const saved = localStorage.getItem('saif_ai_model_chats');
            if (saved) {
                chats = JSON.parse(saved);
            } else {
                const welcomeChat = {
                    id: Date.now().toString(),
                    title: 'Welcome',
                    messages: [{
                        role: 'assistant',
                        content: 'Hello! I\'m Saif AI. Select a model above and start chatting!',
                        timestamp: new Date().toISOString()
                    }],
                    timestamp: new Date().toISOString()
                };
                chats = [welcomeChat];
                saveChats();
            }
        }
        
        function saveChats() {
            localStorage.setItem('saif_ai_model_chats', JSON.stringify(chats));
        }
        
        function createNewChat() {
            const newChat = {
                id: Date.now().toString(),
                title: 'New Chat',
                messages: [],
                timestamp: new Date().toISOString()
            };
            chats.push(newChat);
            saveChats();
            return newChat;
        }
        
        function startNewChat() {
            const newChat = createNewChat();
            loadChat(newChat.id);
            renderHistory();
            closeSidebar();
        }
        
        function loadChat(chatId) {
            currentChatId = chatId;
            const chat = chats.find(c => c.id === chatId);
            if (!chat) return;
            
            displayMessages(chat.messages);
            renderHistory();
        }
        
        function displayMessages(messages) {
            chatArea.innerHTML = '';
            
            if (messages.length === 0) {
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            messages.forEach(msg => {
                appendMessage(msg.role, msg.content, msg.timestamp);
            });
            
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function appendMessage(role, content, timestamp) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role === 'user' ? 'user-message' : 'ai-message'}`;
            
            // Check for media
            if (content.startsWith('![image](')) {
                const imageUrl = content.match(/!\[image\]\((.*?)\)/)[1];
                content = `
                    <div class="text-sm mb-1 flex items-center gap-2">
                        <i class="fas fa-image text-[#10a37f]"></i>
                        Generated Image:
                    </div>
                    <img src="${imageUrl}" class="generated-image" onclick="window.open('${imageUrl}')">
                `;
            } else if (content.startsWith('![video](')) {
                const videoUrl = content.match(/!\[video\]\((.*?)\)/)[1];
                content = `
                    <div class="text-sm mb-1 flex items-center gap-2">
                        <i class="fas fa-video text-[#10a37f]"></i>
                        Generated Video:
                    </div>
                    <video src="${videoUrl}" controls class="generated-video"></video>
                `;
            } else {
                content = `<div class="text-sm">${content}</div>`;
            }
            
            // Add model badge for AI messages
            const modelBadge = role === 'assistant' && !content.includes('Generated') ? 
                `<span class="model-badge"><i class="fas fa-robot mr-1"></i>${currentModel}</span>` : '';
            
            messageDiv.innerHTML = `
                ${content}
                <div class="time-stamp flex items-center justify-between">
                    <span>${formatTime(timestamp)}</span>
                    ${modelBadge}
                </div>
            `;
            
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }
        
        function renderHistory() {
            const sortedChats = [...chats].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).slice(0, 8);
            
            historyList.innerHTML = sortedChats.map(chat => `
                <div class="history-item ${chat.id === currentChatId ? 'active' : ''}" onclick="loadChat('${chat.id}')">
                    <i class="fas fa-comment"></i>
                    <span class="flex-1 text-sm truncate">${chat.title}</span>
                    <span class="text-xs text-gray-600">${formatTimeShort(chat.timestamp)}</span>
                </div>
            `).join('');
        }
        
        function formatTimeShort(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 3600000) return 'now';
            if (diff < 86400000) return date.getHours() + ':' + (date.getMinutes() < 10 ? '0' : '') + date.getMinutes();
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }
        
        function addMessage(role, content) {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            
            const message = {
                role,
                content,
                timestamp: new Date().toISOString()
            };
            
            chat.messages.push(message);
            
            if (role === 'user' && chat.messages.length === 1) {
                chat.title = content.substring(0, 20) + (content.length > 20 ? '...' : '');
            }
            
            chat.timestamp = new Date().toISOString();
            saveChats();
            
            appendMessage(role, content, message.timestamp);
            renderHistory();
        }
        
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;
            
            addMessage('user', message);
            chatInput.value = '';
            improvedPrompt.textContent = `Ready to generate ${currentModel}`;
            
            showTypingIndicator();
            
            try {
                let response;
                switch(currentModel) {
                    case 'image':
                        response = await generateImage(message);
                        break;
                    case 'video':
                        response = await generateVideo(message);
                        break;
                    default:
                        response = await generateText(message);
                }
                
                removeTypingIndicator();
                addMessage('assistant', response);
                
            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', 'Sorry, I encountered an error. Please try again.');
            }
        }
        
        async function generateText(message) {
            const response = await fetch(`${BASE_URL}/v1/chat/completions`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${API_KEY}`, 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ 
                    model: 'openai', 
                    messages: [{ role: 'user', content: message }] 
                })
            });
            const data = await response.json();
            return data.choices[0].message.content;
        }
        
        async function generateImage(message) {
            // Enhance prompt automatically
            const enhancedPrompt = modelPrompts.image.enhance(message);
            
            const url = `${BASE_URL}/image/${encodeURIComponent(enhancedPrompt)}?model=flux&width=800&height=800&key=${API_KEY}`;
            const response = await fetch(url, { headers: { 'Authorization': `Bearer ${API_KEY}` } });
            const blob = await response.blob();
            return `![image](${URL.createObjectURL(blob)})`;
        }
        
        async function generateVideo(message) {
            // Enhance prompt automatically
            const enhancedPrompt = modelPrompts.video.enhance(message);
            
            const url = `${BASE_URL}/video/${encodeURIComponent(enhancedPrompt)}?model=veo&duration=4&key=${API_KEY}`;
            const response = await fetch(url, { headers: { 'Authorization': `Bearer ${API_KEY}` } });
            const blob = await response.blob();
            return `![video](${URL.createObjectURL(blob)})`;
        }
        
        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.id = 'typingIndicator';
            indicator.className = 'message ai-message';
            indicator.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
            chatArea.appendChild(indicator);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function removeTypingIndicator() {
            document.getElementById('typingIndicator')?.remove();
        }
        
        function toggleSidebar() {
            sidebarOpen = !sidebarOpen;
            sidebar.classList.toggle('open', sidebarOpen);
            overlay.classList.toggle('active', sidebarOpen);
        }
        
        function closeSidebar() {
            sidebarOpen = false;
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
        
        // Event listeners
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Initialize
        loadChats();
        if (chats.length > 0) {
            const lastChat = chats.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))[0];
            loadChat(lastChat.id);
        } else {
            startNewChat();
        }
        renderHistory();
        
        // Set default model
        setModel('text', document.querySelector('.model-option'));
        
        // Make functions global
        window.startNewChat = startNewChat;
        window.loadChat = loadChat;
        window.sendMessage = sendMessage;
        window.toggleSidebar = toggleSidebar;
        window.closeSidebar = closeSidebar;
        window.setModel = setModel;
        window.enhancePrompt = enhancePrompt;
        window.updatePromptPreview = updatePromptPreview;
    </script>
</body>
</html>
